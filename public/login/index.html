<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NATHEISM — AUTHORIZATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title"><a href="/" data-text="NATHEISM">NATHEISM</a></h1>
      <span class="site-subtitle">AUTHORIZATION GATEWAY</span>
    </div>
  </header>

  <main class="admin-container">
    <div class="admin-login" id="login-section">
      <h2>AUTHORIZATION REQUIRED</h2>
      <form id="login-form">
        <input type="password" id="password-input" placeholder="ENTER CLEARANCE CODE" autocomplete="off">
        <button type="submit" class="admin-login-btn">AUTHENTICATE</button>
      </form>
      <div class="admin-error" id="login-error"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>NATHEISM &mdash; AUTHORIZED PERSONNEL ONLY</p>
    <p>All access attempts are logged.</p>
  </footer>

  <script>
    const HASH = '6c02b16dd0d13afc3545898c99a341b41e44d88c4bda8e50d0104d00200fcd0e';

    // Redirect if already authenticated
    if (sessionStorage.getItem('natheism_auth') === HASH) {
      window.location.replace('/admin.html');
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password-input').value;
      const hash = await sha256(pw);

      if (hash === HASH) {
        sessionStorage.setItem('natheism_auth', HASH);
        window.location.href = '/admin.html';
      } else {
        document.getElementById('login-error').textContent = 'ACCESS DENIED. INCIDENT LOGGED.';
        document.getElementById('password-input').value = '';
      }
    });
  </script>
</body>
</html>
