<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NATHEISM — Photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/feed.css">
  <link rel="stylesheet" href="/css/photos.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title"><a href="/" data-text="NATHEISM">NATHEISM</a></h1>
      <span class="site-subtitle">THE ANTI-SOCIAL NETWORK</span>
    </div>
  </header>

  <div class="cover-photo">
    <img src="/images/cover.jpg" alt="Cover photo" onerror="this.parentElement.innerHTML='<div class=\'cover-photo-placeholder\'><span class=\'cover-photo-text\'>COVER PHOTO</span></div>'">
  </div>

  <div class="profile-bar">
    <div class="profile-bar-inner">
      <div class="profile-avatar">
        <img src="/images/profile.jpg" alt="Natheist" onerror="this.style.display='none';this.parentElement.textContent='N'">
      </div>
      <div class="profile-info">
        <div class="profile-name">Natheist</div>
        <div class="profile-handle">@natheism</div>
        <div class="profile-stats">
          <span class="profile-stat"><strong>0</strong> Followers</span>
          <span class="profile-stat"><strong>0</strong> Friends</span>
          <a href="/photos" class="profile-stat profile-stat-link">Photos</a>
        </div>
      </div>
    </div>
  </div>

  <main class="gallery-container">
    <a href="/" class="gallery-back">&larr; Timeline</a>
    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>NATHEISM v1.0 &mdash; ALL CONTENT APPROVED BY THE BUREAU OF ACCEPTABLE EXPRESSION</p>
    <p>Your activity has been recorded for quality assurance purposes.</p>
  </footer>

  <script>
    const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      let allPhotos = [];

      try {
        // Load photos from posts
        const postsRes = await fetch(IS_LOCAL ? '/data/posts.json' : '/api.php?action=posts');
        const posts = await postsRes.json();
        const postPhotos = posts
          .filter(p => p.type === 'photo' && p.mediaUrl)
          .map(p => ({ url: p.mediaUrl, content: p.content, author: p.author, timestamp: p.timestamp }));
        allPhotos = allPhotos.concat(postPhotos);
      } catch (err) {}

      try {
        // Load photos from gallery folder
        const galleryRes = await fetch('/api.php?action=gallery');
        if (galleryRes.ok) {
          const galleryPhotos = await galleryRes.json();
          const folderPhotos = galleryPhotos.map(g => ({ url: g.url, content: null, author: null, timestamp: null }));
          allPhotos = allPhotos.concat(folderPhotos);
        }
      } catch (err) {}

      if (allPhotos.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">NO VISUAL RECORDS ON FILE.</div>';
        return;
      }

      allPhotos.forEach(photo => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `<img src="${photo.url}" alt="Visual record" loading="lazy">`;
        item.addEventListener('click', () => openLightbox(photo));
        grid.appendChild(item);
      });
    }

    function openLightbox(photo) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const caption = document.getElementById('lightbox-caption');

      img.src = photo.url;
      img.alt = photo.content || 'Visual record';

      let captionHtml = '';
      if (photo.author || photo.content) {
        if (photo.author) captionHtml += `<strong>${escapeHtml(photo.author)}</strong> `;
        if (photo.content) captionHtml += escapeHtml(photo.content);
      }
      caption.innerHTML = captionHtml;

      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadGallery);
  </script>
</body>
</html>
