<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NATHEISM — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/feed.css">
  <link rel="stylesheet" href="/css/photos.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title"><a href="/" data-text="NATHEISM">NATHEISM</a></h1>
      <span class="site-subtitle">THE ANTI-SOCIAL NETWORK</span>
    </div>
  </header>

  <div class="cover-photo">
    <img src="/images/cover.jpg" alt="Cover photo" onerror="this.parentElement.innerHTML='<div class=\'cover-photo-placeholder\'><span class=\'cover-photo-text\'>COVER PHOTO</span></div>'">
  </div>

  <div class="profile-bar">
    <div class="profile-bar-inner">
      <div class="profile-avatar">
        <img src="/images/profile.jpg" alt="Natheist" onerror="this.style.display='none';this.parentElement.textContent='N'">
      </div>
      <div class="profile-info">
        <div class="profile-name">Natheist</div>
        <div class="profile-handle">@natheism</div>
        <div class="profile-stats">
          <span class="profile-stat"><strong>0</strong> Followers</span>
          <span class="profile-stat"><strong>0</strong> Friends</span>
          <a href="/photos" class="profile-stat profile-stat-link">Gallery</a>
        </div>
        <div class="profile-bio">I'm not here to make friends.</div>
        <div class="profile-links">
          <a href="https://ontomaton.net" class="profile-link" target="_blank" rel="noopener">🔗 ontomaton.net</a>
        </div>
      </div>
    </div>
  </div>

  <main class="gallery-container">
    <a href="/" class="gallery-back">&larr; Timeline</a>
    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-video" id="lightbox-video"></div>
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>NATHEISM v1.0 &mdash; ALL CONTENT APPROVED BY THE BUREAU OF ACCEPTABLE EXPRESSION</p>
    <p>Your activity has been recorded for quality assurance purposes.</p>
  </footer>

  <div class="profile-viewer-overlay" id="profile-viewer">
    <img src="/images/profile.jpg" alt="Natheist">
  </div>
  <script>
    (function() {
      var avatar = document.querySelector('.profile-avatar');
      var viewer = document.getElementById('profile-viewer');
      if (avatar && viewer) {
        avatar.addEventListener('click', function() { viewer.classList.add('active'); document.body.style.overflow = 'hidden'; });
        viewer.addEventListener('click', function() { viewer.classList.remove('active'); document.body.style.overflow = ''; });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { viewer.classList.remove('active'); document.body.style.overflow = ''; } });
      }
    })();
  </script>
  <script>
    const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      let allItems = [];

      try {
        const postsRes = await fetch(IS_LOCAL ? '/data/posts.json' : '/api.php?action=posts');
        const posts = await postsRes.json();

        // Photos from posts
        posts.filter(p => p.type === 'photo' && p.mediaUrl).forEach(p => {
          allItems.push({ type: 'photo', url: p.mediaUrl, content: p.content, author: p.author, timestamp: p.timestamp });
        });

        // Videos from posts (YouTube thumbnails)
        posts.filter(p => p.type === 'video' && p.mediaUrl).forEach(p => {
          const vidMatch = p.mediaUrl.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
          if (vidMatch) {
            allItems.push({
              type: 'video',
              url: p.mediaUrl,
              thumbUrl: 'https://img.youtube.com/vi/' + vidMatch[1] + '/hqdefault.jpg',
              content: p.content, author: p.author, timestamp: p.timestamp
            });
          }
        });
      } catch (err) {}

      if (!IS_LOCAL) {
        try {
          const galleryRes = await fetch('/api.php?action=gallery');
          if (galleryRes.ok) {
            const galleryPhotos = await galleryRes.json();
            galleryPhotos.forEach(g => {
              allItems.push({ type: 'photo', url: g.url, content: null, author: null, timestamp: null });
            });
          }
        } catch (err) {}
      }

      if (allItems.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">NO VISUAL RECORDS ON FILE.</div>';
        return;
      }

      allItems.forEach(item => {
        const el = document.createElement('div');
        el.className = 'gallery-item' + (item.type === 'video' ? ' gallery-item-video' : '');
        const imgSrc = item.type === 'video' ? item.thumbUrl : item.url;
        el.innerHTML = '<img src="' + imgSrc + '" alt="Visual record" loading="lazy">';
        if (item.type === 'video') {
          el.innerHTML += '<div class="gallery-play-overlay">\u25B6</div>';
        }
        el.addEventListener('click', () => openLightbox(item));
        grid.appendChild(el);
      });
    }

    function openLightbox(item) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const video = document.getElementById('lightbox-video');
      const caption = document.getElementById('lightbox-caption');

      if (item.type === 'video') {
        img.style.display = 'none';
        video.style.display = 'block';
        video.innerHTML = '<iframe src="' + item.url + '?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
      } else {
        img.style.display = 'block';
        video.style.display = 'none';
        video.innerHTML = '';
        img.src = item.url;
        img.alt = item.content || 'Visual record';
      }

      let captionHtml = '';
      if (item.author || item.content) {
        if (item.author) captionHtml += '<strong>' + escapeHtml(item.author) + '</strong> ';
        if (item.content) captionHtml += escapeHtml(item.content);
      }
      caption.innerHTML = captionHtml;

      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      var video = document.getElementById('lightbox-video');
      video.innerHTML = '';
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadGallery);
  </script>
</body>
</html>
